<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>App de Mídia Pro</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    /* VARIÁVEIS E RESET */
    :root {
      --bg-dark: #0b0f17;
      --bg-panel: #121826;
      --text-light: #ffffff;
      --text-muted: #9aa4b2;
      --accent-red: #ff3b30;
      --spotify: #1DB954;
      --deezer: linear-gradient(90deg, #ef5466, #ff7a18);
      --globoplay: linear-gradient(90deg, #ea3a3d, #ff6a00);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }

    /* TELA DE LOGIN */
    #loginScreen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(circle at top, #162033 0%, var(--bg-dark) 80%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 1000; transition: opacity 0.5s ease;
    }
    .login-box {
      background: var(--bg-panel); padding: 30px; border-radius: 20px;
      width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }
    .login-box h2 { margin-bottom: 20px; }
    .input-group { margin-bottom: 15px; }
    .input-group input {
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2); color: white; outline: none;
    }
    
    /* Botões de Mídia e Efeito Light Sweep */
    .btn-media {
      width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 10px;
      color: white; font-weight: bold; font-size: 14px; cursor: pointer;
      position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-media::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg); animation: sweep 4s infinite;
    }
    @keyframes sweep { 0% { left: -100%; } 20% { left: 150%; } 100% { left: 150%; } }
    
    .btn-enter { background: var(--accent-red); margin-top: 10px; }
    .btn-spotify { background: var(--spotify); }
    .btn-deezer { background: var(--deezer); }
    .btn-globoplay { background: var(--globoplay); }

    /* ESTRUTURA PRINCIPAL (APP) */
    #appScreen { display: none; width: 100vw; height: 100vh; flex-direction: row; }

    /* MENU LATERAL */
    .sidebar {
      width: 250px; background: var(--bg-panel); border-right: 1px solid rgba(255,255,255,0.05);
      display: flex; flex-direction: column; padding: 20px; transition: transform 0.3s ease;
    }
    .sidebar h2 { color: var(--accent-red); margin-bottom: 30px; font-size: 24px; text-align: center; }
    .menu-item {
      padding: 12px 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; gap: 15px; color: var(--text-muted); transition: 0.2s;
    }
    .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.1); color: white; }
    
    .install-app-container { margin-top: auto; }
    .btn-install {
      background: rgba(37, 99, 235, 0.2); border: 1px solid #2563eb; color: white;
      width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold;
    }

    /* ÁREA DE CONTEÚDO (HOME) */
    .main-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .menu-toggle { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
    
    .hero-banner {
      width: 100%; height: 200px; border-radius: 20px; margin-bottom: 30px;
      background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=1000') center/cover;
      display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
    }

    /* CARROSSÉIS HORIZONTAIS */
    .category-section { margin-bottom: 30px; }
    .category-section h3 { margin-bottom: 15px; font-size: 18px; }
    
    .carousel-tags {
      display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; scroll-behavior: smooth;
    }
    .carousel-tags::-webkit-scrollbar { height: 6px; }
    .carousel-tags::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

    .video-card {
      min-width: 220px; background: rgba(255,255,255,0.05); border-radius: 15px; overflow: hidden;
      cursor: pointer; transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.05);
    }
    .video-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }
    .thumb { width: 100%; height: 120px; background: #222; object-fit: cover; }
    .card-info { padding: 10px; }
    .card-info h4 { font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-info p { font-size: 12px; color: var(--text-muted); }

    /* RESPONSIVIDADE PARA CELULAR */
    @media (max-width: 768px) {
      .sidebar { position: fixed; height: 100%; z-index: 50; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2>Acessar App</h2>
      <div class="input-group">
        <input type="email" placeholder="Seu E-mail">
      </div>
      <div class="input-group">
        <input type="password" placeholder="Senha">
      </div>
      <button class="btn-media btn-enter" onclick="entrarApp()">Entrar</button>
      
      <p style="margin: 20px 0; font-size: 12px; color: var(--text-muted);">OU ENTRE COM</p>
      
      <button class="btn-media btn-globoplay" onclick="entrarApp()">
        <i class="fa-solid fa-play"></i> Entrar com Globoplay
      </button>
      <button class="btn-media btn-spotify" onclick="entrarApp()">
        <i class="fa-brands fa-spotify"></i> Entrar com Spotify
      </button>
      <button class="btn-media btn-deezer" onclick="entrarApp()">
        <i class="fa-solid fa-music"></i> Entrar com Deezer
      </button>
    </div>
  </div>

  <div id="appScreen">
    
    <nav class="sidebar" id="sidebar">
      <h2>App<span style="color:white;">Mídia</span></h2>
      <div class="menu-item active"><i class="fa-solid fa-house"></i> Início</div>
      <div class="menu-item"><i class="fa-solid fa-compass"></i> Explorar</div>
      <div class="menu-item"><i class="fa-solid fa-fire"></i> Em Alta</div>
      <div class="menu-item"><i class="fa-solid fa-folder"></i> Minha Lista</div>
      
      <div class="install-app-container">
        <button class="btn-install" onclick="alert('Funcionalidade PWA acionada!')">
          <i class="fa-solid fa-download"></i> Instalar App
        </button>
      </div>
    </nav>

    <main class="main-content">
      <header class="header">
        <button class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
        <div style="flex:1; margin-left: 15px;">
          <input type="text" placeholder="Buscar filmes, lives, músicas..." 
                 style="width: 100%; max-width: 300px; padding: 10px 15px; border-radius: 20px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none;">
        </div>
        <div style="width: 40px; height: 40px; border-radius: 50%; background: #444; display:flex; align-items:center; justify-content:center;">
          <i class="fa-solid fa-user"></i>
        </div>
      </header>

      <div class="hero-banner">
        <h1 style="margin-bottom: 5px;">Lançamentos Exclusivos</h1>
        <p style="color: #ccc; font-size: 14px; margin-bottom: 15px;">Assista agora em alta definição.</p>
        <div>
          <button style="padding: 10px 20px; background: white; color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;"><i class="fa-solid fa-play"></i> Assistir</button>
        </div>
      </div>

      <div class="category-section">
        <h3>Ao Vivo: Notícias e Info</h3>
        <div class="carousel-tags" id="carouselNews">
          </div>
      </div>

      <div class="category-section">
        <h3>Lives e Shows de Forró</h3>
        <div class="carousel-tags" id="carouselForro">
          </div>
      </div>

      <div class="category-section">
        <h3>Continue Assistindo</h3>
        <div class="carousel-tags" id="carouselDestaques">
          </div>
      </div>

    </main>
  </div>

  <script>
    // LÓGICA DE LOGIN
    function entrarApp() {
      document.getElementById('loginScreen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'flex';
      }, 500);
    }

    // LÓGICA DO MENU MOBILE
    function toggleMenu() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('open');
    }

    // POPULAR CARROSSÉIS HORIZONTAIS
    const gerarCards = (containerId, titulos) => {
      const container = document.getElementById(containerId);
      titulos.forEach((titulo, index) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        // Usando imagens genéricas como placeholder para o layout
        card.innerHTML = `
          <img class="thumb" src="https://picsum.photos/seed/${containerId}${index}/300/150" alt="${titulo}">
          <div class="card-info">
            <h4>${titulo}</h4>
            <p>12k assistindo agora</p>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Listas de conteúdos
    gerarCards('carouselNews', ['CNN Brasil Ao Vivo', 'Jornal da Manhã', 'Giro de Notícias', 'Economia Agora', 'Debate Político']);
    gerarCards('carouselForro', ['Live Forró Romântico', 'Especial São João', 'Piseiro Hits 2026', 'Forró das Antigas', 'Barões Sunset']);
    gerarCards('carouselDestaques', ['Dev Vlog: Deploy Vercel', 'Tutorial de APIs', 'Melhores Momentos', 'Podcast Tech', 'Review de Setup']);

  </script>
</body>
</html>
