<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamonie Flash</title>
    <style>
        /* --- ESTILOS VISUAIS (CSS) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #3b4a5a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Área Principal */
        #main-area {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* Tela Inicial */
        #home-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 90%;
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 70px;
            cursor: pointer;
        }

        .shortcut-icon {
            width: 65px;
            height: 65px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .shortcut-icon:active { transform: scale(0.9); }
        .shortcut span { font-size: 13px; font-weight: 500; }

        .snips-badge {
            background-color: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 40px;
        }

        /* Navegador (Iframe) */
        #browser-view {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
        }

        /* Barra Inferior */
        #bottom-bar {
            height: 65px;
            background-color: #1e252d;
            display: flex;
            align-items: center;
            padding: 0 10px;
            justify-content: space-between;
            border-top: 1px solid #2c3540;
            padding-bottom: env(safe-area-inset-bottom); /* Suporte para iPhone */
        }

        .nav-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            padding: 10px;
            cursor: pointer;
        }

        .search-container {
            flex: 1;
            background-color: #2c3540;
            height: 45px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            margin: 0 8px;
        }

        .search-container input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 15px;
            outline: none;
            padding: 0 8px;
        }

        .search-container input::placeholder { color: #999; }

        .ai-btn {
            background-color: #ff66b2;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .tab-icon {
            width: 26px;
            height: 26px;
            border: 2px solid #fff;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
        }

        /* Gerenciador de Abas */
        #tab-manager {
            position: fixed;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(30, 37, 45, 0.98);
            z-index: 100;
            transition: top 0.3s ease-in-out;
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-top: 50px;
        }

        #tab-manager.active { top: 0; }

        .tab-title { font-size: 26px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        
        #tab-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

        .tab-item {
            background-color: #2c3540;
            padding: 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .tab-item.active-tab { border: 2px solid #ff66b2; }

        .tab-url { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 16px; }

        .close-tab-btn { background-color: #ff4444; color: #fff; border: none; border-radius: 8px; padding: 8px 15px; font-weight: bold; margin-left: 10px; }

        .new-tab-btn { background-color: #0055ff; color: #fff; border: none; border-radius: 12px; padding: 18px; font-size: 18px; font-weight: bold; margin-top: 15px; }

        .close-manager-btn { background: none; border: none; color: #fff; padding: 15px; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="main-area">
        
        <div id="home-screen">
            <div class="logo">LAMONIE</div>
            
            <div class="grid">
                <div class="shortcut" onclick="loadUrl('https://www.bing.com')">
                    <div class="shortcut-icon" style="background-color: #fff; color: #000;">G</div>
                    <span>Search</span>
                </div>
                <div class="shortcut" onclick="loadUrl('https://www.youtube.com/embed/?modestbranding=1')">
                    <div class="shortcut-icon" style="background-color: #ff0000; color: #fff;">Y</div>
                    <span>YouTube</span>
                </div>
                <div class="shortcut" onclick="loadUrl('https://weather.com')">
                    <div class="shortcut-icon" style="background-color: #ff9900; color: #fff;">W</div>
                    <span>Clima</span>
                </div>
                <div class="shortcut" onclick="loadUrl('https://g1.globo.com')">
                    <div class="shortcut-icon" style="background-color: #0055ff; color: #fff;">N</div>
                    <span>Notícias</span>
                </div>
            </div>

            <div class="snips-badge">✨ Apresentando o Snips!</div>
        </div>

        <iframe id="browser-view" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>

    <div id="bottom-bar">
        <button class="nav-btn" onclick="goHome()">🏠</button>
        
        <div class="search-container">
            <span style="font-size: 16px;">🛡️</span>
            <input type="text" id="url-input" placeholder="Pesquisar ou URL..." autocomplete="off">
            <button class="ai-btn">AI</button>
        </div>

        <button class="nav-btn" onclick="toggleTabManager()">
            <div class="tab-icon" id="tab-counter">1</div>
        </button>
        
        <button class="nav-btn">☰</button>
    </div>

    <div id="tab-manager">
        <div class="tab-title">Abas Abertas</div>
        <div id="tab-list"></div>
        <button class="new-tab-btn" onclick="createNewTab()">+ Nova Aba</button>
        <button class="close-manager-btn" onclick="toggleTabManager()">Voltar ao Navegador</button>
    </div>

    <script>
        // Memória do App
        let tabs = [{ id: Date.now(), url: '' }];
        let activeTabId = tabs[0].id;

        // Pegando elementos da tela
        const homeScreen = document.getElementById('home-screen');
        const browserView = document.getElementById('browser-view');
        const urlInput = document.getElementById('url-input');
        const tabCounter = document.getElementById('tab-counter');
        const tabManager = document.getElementById('tab-manager');
        const tabList = document.getElementById('tab-list');

        // Carregar um Site
        function loadUrl(url) {
            if (!url) return;
            
            let finalUrl = url;
            // Se não tiver HTTP, pesquisa no Bing (pois Google bloqueia iframes externos por segurança)
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                finalUrl = `https://www.bing.com/search?q=${encodeURIComponent(url)}`;
            }

            // Atualiza a aba atual
            const activeTab = tabs.find(t => t.id === activeTabId);
            if (activeTab) activeTab.url = finalUrl;

            // Mostra o site e esconde a Home
            urlInput.value = finalUrl;
            homeScreen.style.display = 'none';
            browserView.style.display = 'block';
            browserView.src = finalUrl;
            tabManager.classList.remove('active');
            renderTabs();
        }

        // Detectar o botão "Ir" no teclado do celular
        urlInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                loadUrl(this.value);
                this.blur(); // Esconde o teclado
            }
        });

        // Botão Home
        function goHome() {
            const activeTab = tabs.find(t => t.id === activeTabId);
            if (activeTab) activeTab.url = '';
            
            urlInput.value = '';
            browserView.style.display = 'none';
            browserView.src = '';
            homeScreen.style.display = 'flex';
            renderTabs();
        }

        // --- SISTEMA DE ABAS ---
        function toggleTabManager() {
            renderTabs();
            tabManager.classList.toggle('active');
        }

        function renderTabs() {
            tabCounter.innerText = tabs.length;
            tabList.innerHTML = '';

            tabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = 'tab-item' + (tab.id === activeTabId ? ' active-tab' : '');

                const urlSpan = document.createElement('div');
                urlSpan.className = 'tab-url';
                urlSpan.innerText = tab.url || 'Página Inicial (Lamonie)';
                urlSpan.onclick = () => switchToTab(tab.id);

                const closeBtn = document.createElement('button');
                closeBtn.className = 'close-tab-btn';
                closeBtn.innerText = 'X';
                closeBtn.onclick = () => closeTab(tab.id);

                tabEl.appendChild(urlSpan);
                tabEl.appendChild(closeBtn);
                tabList.appendChild(tabEl);
            });
        }

        function createNewTab() {
            const newTab = { id: Date.now(), url: '' };
            tabs.push(newTab);
            switchToTab(newTab.id);
        }

        function switchToTab(id) {
            activeTabId = id;
            const activeTab = tabs.find(t => t.id === id);
            
            if (activeTab.url === '') {
                goHome();
            } else {
                urlInput.value = activeTab.url;
                homeScreen.style.display = 'none';
                browserView.style.display = 'block';
                browserView.src = activeTab.url;
            }
            tabManager.classList.remove('active');
            renderTabs();
        }

        function closeTab(id) {
            if (tabs.length === 1) return; // Não fecha se for a última aba
            tabs = tabs.filter(t => t.id !== id);
            
            if (activeTabId === id) {
                switchToTab(tabs[0].id);
            } else {
                renderTabs();
            }
        }
    </script>
</body>
</html>
