<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamonie Flash</title>
    <style>
        /* --- RESET E VARIÁVEIS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-main: #3b4a5a;
            --bg-bar: #1e252d;
            --bg-search: #2c3540;
            --text-light: #ffffff;
            --accent-pink: #ff66b2;
            --accent-blue: #0055ff;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- ÁREA PRINCIPAL (HOME & IFRAME) --- */
        #main-area {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #home-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20vh;
            transition: opacity 0.3s;
        }

        .logo {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 50px;
        }

        /* Carrossel Horizontal Responsivo para Atalhos */
        .shortcuts-carousel {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            width: 100%;
            padding: 20px;
            justify-content: center;
            scrollbar-width: none; /* Oculta scroll no Firefox */
        }
        .shortcuts-carousel::-webkit-scrollbar {
            display: none; /* Oculta scroll no Chrome/Safari */
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            min-width: 70px;
        }

        .shortcut-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .shortcut-icon:active {
            transform: scale(0.95);
        }

        .shortcut span {
            font-size: 12px;
        }

        /* O "Motor" do Navegador Web */
        #browser-view {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
        }

        /* --- TOOLTIP (Snips) --- */
        .tooltip {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .tooltip button {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        /* --- BARRA INFERIOR --- */
        #bottom-bar {
            height: 60px;
            background-color: var(--bg-bar);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            z-index: 20;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 22px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-container {
            flex: 1;
            background-color: var(--bg-search);
            height: 40px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
        }

        .search-container input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 14px;
            outline: none;
        }

        .search-container input::placeholder {
            color: #999;
        }

        /* Animação Light Sweep no Botão AI */
        .ai-btn {
            background-color: var(--accent-pink);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .ai-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: lightSweep 3s infinite;
        }

        @keyframes lightSweep {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-light);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        /* --- GERENCIADOR DE ABAS (MODAL) --- */
        #tab-manager {
            position: fixed;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-bar);
            z-index: 30;
            transition: top 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #tab-manager.active {
            top: 0;
        }

        .tab-manager-header {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            margin-top: 20px;
        }

        #tab-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tab-item {
            background-color: var(--bg-main);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tab-url {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .close-tab-btn {
            background-color: #ff4444;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }

        .new-tab-btn {
            background-color: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .close-manager-btn {
            background: none;
            border: none;
            color: var(--text-light);
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div id="main-area">
        
        <div id="home-screen">
            <div class="logo">LAMONIE</div>
            
            <div class="shortcuts-carousel">
                <div class="shortcut" onclick="loadUrl('https://www.bing.com')">
                    <div class="shortcut-icon" style="background-color: #fff; color: #000;">G</div>
                    <span>Search</span>
                </div>
                <div class="shortcut" onclick="loadUrl('https://m.youtube.com')">
                    <div class="shortcut-icon" style="background-color: #ff0000; color: #fff;">Y</div>
                    <span>YouTube</span>
                </div>
                <div class="shortcut" onclick="loadUrl('https://weather.com')">
                    <div class="shortcut-icon" style="background-color: #ff9900; color: #fff;">W</div>
                    <span>Weather</span>
                </div>
                <div class="shortcut" onclick="loadUrl('https://open.spotify.com')">
                    <div class="shortcut-icon" style="background-color: #1DB954; color: #fff;">S</div>
                    <span>Spotify</span>
                </div>
            </div>

            <div class="tooltip" id="snips-tooltip">
                ✨ Apresentando o Snips!
                <button onclick="document.getElementById('snips-tooltip').style.display='none'">✕</button>
            </div>
        </div>

        <iframe id="browser-view" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>

    <div id="bottom-bar">
        <button class="nav-btn" onclick="goHome()">🏠</button>
        
        <div class="search-container">
            <span style="font-size: 14px;">🛡️</span>
            <input type="text" id="url-input" placeholder="Procurar em Google" autocomplete="off">
            <button class="ai-btn">AI</button>
        </div>

        <button class="nav-btn" onclick="toggleTabManager()">
            <div class="tab-icon" id="tab-counter">1</div>
        </button>
        
        <button class="nav-btn">☰</button>
    </div>

    <div id="tab-manager">
        <div class="tab-manager-header">Abas Abertas</div>
        <div id="tab-list">
            </div>
        <button class="new-tab-btn" onclick="createNewTab()">+ Nova Aba</button>
        <button class="close-manager-btn" onclick="toggleTabManager()">Voltar</button>
    </div>

    <script>
        // Sistema de Estado das Abas
        let tabs = [{ id: Date.now(), url: '' }];
        let activeTabId = tabs[0].id;

        // Elementos do DOM
        const homeScreen = document.getElementById('home-screen');
        const browserView = document.getElementById('browser-view');
        const urlInput = document.getElementById('url-input');
        const tabCounter = document.getElementById('tab-counter');
        const tabManager = document.getElementById('tab-manager');
        const tabList = document.getElementById('tab-list');

        // --- NAVEGAÇÃO ---

        // Carrega uma URL na aba ativa
        function loadUrl(url) {
            if (!url) return;
            
            // Tratamento simples de URL vs Pesquisa
            let finalUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                finalUrl = `https://www.bing.com/search?q=${encodeURIComponent(url)}`;
                // Usando Bing no exemplo pois o Google bloqueia iframes (X-Frame-Options)
            }

            // Atualiza o estado da aba ativa
            const activeTab = tabs.find(t => t.id === activeTabId);
            if(activeTab) {
                activeTab.url = finalUrl;
            }

            // Atualiza a UI
            urlInput.value = finalUrl;
            homeScreen.style.display = 'none';
            browserView.style.display = 'block';
            browserView.src = finalUrl;
        }

        // Detecta o "Enter" na barra de pesquisa
        urlInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                loadUrl(this.value);
            }
        });

        // Volta para a página inicial
        function goHome() {
            const activeTab = tabs.find(t => t.id === activeTabId);
            if(activeTab) activeTab.url = '';
            
            urlInput.value = '';
            browserView.style.display = 'none';
            browserView.src = '';
            homeScreen.style.display = 'flex';
        }

        // --- GERENCIAMENTO DE ABAS ---

        function toggleTabManager() {
            renderTabs();
            tabManager.classList.toggle('active');
        }

        function renderTabs() {
            tabCounter.innerText = tabs.length;
            tabList.innerHTML = '';

            tabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = 'tab-item';
                // Destaque visual se for a aba ativa
                if (tab.id === activeTabId) {
                    tabEl.style.borderLeft = '4px solid var(--accent-pink)';
                }

                const urlSpan = document.createElement('span');
                urlSpan.className = 'tab-url';
                urlSpan.innerText = tab.url || 'Página Inicial';
                urlSpan.onclick = () => switchToTab(tab.id);

                const closeBtn = document.createElement('button');
                closeBtn.className = 'close-tab-btn';
                closeBtn.innerText = '✕';
                closeBtn.onclick = () => closeTab(tab.id);

                tabEl.appendChild(urlSpan);
                tabEl.appendChild(closeBtn);
                tabList.appendChild(tabEl);
            });
        }

        function createNewTab() {
            const newTab = { id: Date.now(), url: '' };
            tabs.push(newTab);
            switchToTab(newTab.id);
        }

        function switchToTab(id) {
            activeTabId = id;
            const activeTab = tabs.find(t => t.id === id);
            
            if (activeTab.url === '') {
                goHome();
            } else {
                urlInput.value = activeTab.url;
                homeScreen.style.display = 'none';
                browserView.style.display = 'block';
                browserView.src = activeTab.url;
            }
            
            tabManager.classList.remove('active');
            renderTabs();
        }

        function closeTab(id) {
            if (tabs.length === 1) return; // Impede fechar a última aba
            
            tabs = tabs.filter(t => t.id !== id);
            
            // Se fechou a aba atual, muda para a primeira disponível
            if (activeTabId === id) {
                switchToTab(tabs[0].id);
            } else {
                renderTabs();
            }
        }
    </script>
</body>
</html>
