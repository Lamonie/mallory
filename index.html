<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamonie Flash</title>
    <style>
        /* --- ESTILOS VISUAIS (CSS) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #3b4a5a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #main-area {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* --- TELA INICIAL --- */
        #home-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 90%;
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 70px;
            cursor: pointer;
        }

        .shortcut-icon {
            width: 65px;
            height: 65px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .shortcut-icon:active { transform: scale(0.9); }
        .shortcut span { font-size: 13px; font-weight: 500; }

        .snips-badge {
            background-color: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 40px;
        }

        /* --- MENU NATIVO DO YOUTUBE (NOVO) --- */
        #yt-menu {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            width: 100%;
            background-color: #2c3540;
        }

        .yt-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #fff;
        }

        .yt-category-btn {
            width: 80%;
            background-color: #ff0000;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            text-align: center;
        }

        .yt-category-btn.news { background-color: #0055ff; }
        .yt-category-btn.music { background-color: #ff9900; }

        /* Navegador (Iframe) */
        #browser-view {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }

        /* --- BARRA INFERIOR --- */
        #bottom-bar {
            height: 65px;
            background-color: #1e252d;
            display: flex;
            align-items: center;
            padding: 0 10px;
            justify-content: space-between;
            border-top: 1px solid #2c3540;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            padding: 10px;
            cursor: pointer;
        }

        .search-container {
            flex: 1;
            background-color: #2c3540;
            height: 45px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            margin: 0 8px;
        }

        .search-container input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 15px;
            outline: none;
            padding: 0 8px;
        }

        .search-container input::placeholder { color: #999; }

        .ai-btn {
            background-color: #ff66b2;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .tab-icon {
            width: 26px;
            height: 26px;
            border: 2px solid #fff;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="main-area">
        
        <div id="home-screen">
            <div class="logo">LAMONIE</div>
            
            <div class="grid">
                <div class="shortcut" onclick="loadUrl('https://www.bing.com')">
                    <div class="shortcut-icon" style="background-color: #fff; color: #000;">G</div>
                    <span>Search</span>
                </div>
                <div class="shortcut" onclick="openYouTubeMenu()">
                    <div class="shortcut-icon" style="background-color: #ff0000; color: #fff;">Y</div>
                    <span>YouTube</span>
                </div>
                <div class="shortcut" onclick="loadUrl('https://weather.com')">
                    <div class="shortcut-icon" style="background-color: #ff9900; color: #fff;">W</div>
                    <span>Clima</span>
                </div>
                <div class="shortcut" onclick="loadUrl('https://g1.globo.com')">
                    <div class="shortcut-icon" style="background-color: #0055ff; color: #fff;">N</div>
                    <span>Notícias</span>
                </div>
            </div>
            <div class="snips-badge">✨ Apresentando o Snips!</div>
        </div>

        <div id="yt-menu">
            <div class="yt-header">Lamonie Vídeos</div>
            <button class="yt-category-btn" onclick="loadUrl('https://www.youtube.com/embed/videoseries?list=PLMC9KNkIncKvYin_USF1qoJQnIyMAfRxl&modestbranding=1')">🔥 Músicas em Alta</button>
            <button class="yt-category-btn news" onclick="loadUrl('https://www.youtube.com/embed/videoseries?list=PL3ZQ5CpNulQldOL3T8g8RNMvqFWAsNtIl&modestbranding=1')">📰 CNN Brasil & Notícias</button>
            <button class="yt-category-btn music" onclick="loadUrl('https://www.youtube.com/embed/videoseries?list=PL15B1E77EEA92B051&modestbranding=1')">🪗 Top Hits & Forró</button>
        </div>

        <iframe id="browser-view" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
    </div>

    <div id="bottom-bar">
        <button class="nav-btn" onclick="goHome()">🏠</button>
        <div class="search-container">
            <span style="font-size: 16px;">🛡️</span>
            <input type="text" id="url-input" placeholder="Pesquisar ou URL..." autocomplete="off">
            <button class="ai-btn">AI</button>
        </div>
        <button class="nav-btn">
            <div class="tab-icon" id="tab-counter">1</div>
        </button>
        <button class="nav-btn">☰</button>
    </div>

    <script>
        const homeScreen = document.getElementById('home-screen');
        const ytMenu = document.getElementById('yt-menu');
        const browserView = document.getElementById('browser-view');
        const urlInput = document.getElementById('url-input');

        // Abre o menu customizado do YouTube
        function openYouTubeMenu() {
            homeScreen.style.display = 'none';
            browserView.style.display = 'none';
            ytMenu.style.display = 'flex';
            urlInput.value = 'lamonie://videos';
        }

        // Carrega o site ou o player de vídeo limpo
        function loadUrl(url) {
            if (!url) return;
            
            let finalUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                finalUrl = `https://www.bing.com/search?q=${encodeURIComponent(url)}`;
            }

            urlInput.value = finalUrl;
            homeScreen.style.display = 'none';
            ytMenu.style.display = 'none';
            browserView.style.display = 'block';
            browserView.src = finalUrl;
        }

        // Detecta o botão "Enter" no teclado
        urlInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                loadUrl(this.value);
                this.blur();
            }
        });

        // Volta para a página inicial
        function goHome() {
            urlInput.value = '';
            browserView.style.display = 'none';
            browserView.src = '';
            ytMenu.style.display = 'none';
            homeScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
